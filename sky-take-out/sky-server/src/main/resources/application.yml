server:
  port: 8080

spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  datasource:
    druid:
      driver-class-name: ${sky.datasource.driver-class-name}
      url: jdbc:mysql://${sky.datasource.host}:${sky.datasource.port}/${sky.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
      username: ${sky.datasource.username}
      password: ${sky.datasource.password}
  redis:
    host: ${sky.redis.host}
    port: ${sky.redis.port}
    password: ${sky.redis.password}
    database: ${sky.redis.database}

mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sky.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      sky:
        mapper: debug
        service: info
        controller: info

sky:
  cache:
    # 用户端菜品列表/详情缓存过期时间（小时），失效失败时可依赖 TTL 兜底
    dish-ttl-hours: 12
    shopping-cart-ttl-hours: 24
    # 缓存雪崩防护：TTL 随机偏移比例（±20%），避免大量缓存同时过期
    ttl-jitter-factor: 0.2
    # SCAN 命令单次迭代返回的元素数量
    scan-batch-size: 100

  # 布隆过滤器配置
  bloom-filter:
    dish:
      expected-insertions: 200
      false-positive-rate: 0.01
    category:
      expected-insertions: 50
      false-positive-rate: 0.01
    setmeal:
      expected-insertions: 100
      false-positive-rate: 0.01

  # 分布式锁配置
  lock:
    wait-time-seconds: 3
    default-expire-seconds: 30

  # 异步线程池配置
  async:
    core-pool-multiplier: 2
    max-pool-multiplier: 4
    queue-capacity: 500
    keep-alive-seconds: 60
    await-termination-seconds: 60
    thread-name-prefix: "AsyncDel-"

  jwt:
    # 设置jwt签名加密时使用的秘钥
    admin-secret-key: smx
    # 设置jwt过期时间
    # 2 小时
    admin-ttl: 7200000
    # 设置前端传递过来的令牌名称
    admin-token-name: token
    user-secret-key: smx
    # 7 天
    user-ttl: 604800000
    user-token-name: authentication
  alioss:
    endpoint: ${sky.alioss.endpoint}
    access-key-id: ${sky.alioss.access-key-id}
    access-key-secret: ${sky.alioss.access-key-secret}
    bucket-name: ${sky.alioss.bucket-name}
  wechat:
    appid: ${sky.wechat.appid}
    secret: ${sky.wechat.secret}
    mchid: ${sky.wechat.mchid}
    mchSerialNo: ${sky.wechat.mchSerialNo}
    privateKeyFilePath: ${sky.wechat.privateKeyFilePath}
    apiV3Key: ${sky.wechat.apiV3Key}
    weChatPayCertFilePath: ${sky.wechat.weChatPayCertFilePath}
    notifyUrl: ${sky.wechat.notifyUrl}
    refundNotifyUrl: ${sky.wechat.refundNotifyUrl}
  shop:
    address: 湖北省武汉市洪山区徐东大街18号
  baidu:
    ak: EFEEFFEFEFE